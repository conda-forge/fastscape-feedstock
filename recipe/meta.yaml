{% set name = "fastscape" %}
{% set version = "0.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/fastscape-{{ version }}.tar.gz
  sha256: 8ccc43f19aa13997588818bd017647aebd9c7015e76dd02348ab25dc3527560e

build:
  number: 1
  noarch: python
  script: "{{ PYTHON }} -m pip install . -vv"

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=42
    - setuptools-scm >=7
    - pip
  run:
    - python >={{ python_min }}
    - xarray-simlab >=0.5.0
    - fastscapelib-f2py >=2.8.3
    - numba

test:
  requires:
    - python {{ python_min }}
  imports:
    - fastscape

about:
  home: https://github.com/fastscape-lem/fastscape
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: 'Fast, versatile and user-friendly landscape evolution models'
  doc_url: https://fastscape.readthedocs.io
  dev_url: https://github.com/fastscape-lem/fastscape

extra:
  recipe-maintainers:
    - benbovy
